network:
  https_port: 8443
  websocket_port: 8442
  host_ip: 0.0.0.0

ssl:
  certfile: cert.pem
  keyfile: key.pem

robot:
  left_arm:
    name: Left Arm
    enabled: true
  right_arm:
    name: Right Arm
    enabled: true
  vr_to_robot_scale: 1.0
  send_interval: 0.05
  ground_height: -0.05

control:
  keyboard:
    enabled: false
    pos_step: 0.01
    angle_step: 5.0
    gripper_step: 10.0
  vr:
    enabled: true
  pybullet:
    enabled: true

paths:
  urdf_path: URDF/Piper/dual_piper.urdf
  deposit_pose_file: data/deposit_pose.yaml

gripper:
  open_angle: 0.0
  closed_angle: 45.0

ik:
  use_reference_poses: false
  reference_poses_file: reference_poses.json
  position_error_threshold: 0.001
  hysteresis_threshold: 0.01
  movement_penalty_weight: 0.01

cameras:
  wrist1:
    type: monocular
    backend: realsense
    serial_number: 234322305361
    mode: recording
    fps: "30"
    frame_width: "640"
    frame_height: "480"
    capture_frame_width: "640"
    capture_frame_height: "480"
    capture_api: 200
    cam_index: "0"
  topdown:
    type: monocular
    backend: realsense
    serial_number: 213522251124
    # serial_number: "030422250224"
    mode: recording
    fps: "30"
    frame_width: "640"
    frame_height: "480"
    capture_frame_width: "640"
    capture_frame_height: "480"
    capture_api: 200
    cam_index: "0"
